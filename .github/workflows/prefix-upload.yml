name: Upload to prefix.dev
on:
  workflow_run:
    workflows: ["Build conda package"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write   # OIDC token for trusted publishing
  actions: read     # download artifacts from the build run

jobs:
  upload:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: conda_pkgs_*
          path: artifacts

      - name: Extract package archives
        run: |
          shopt -s globstar nullglob
          for z in artifacts/**/*.zip; do
            unzip -q -o "$z" -d extracted
          done

      - name: Install rattler-build
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-x86_64-unknown-linux-musl \
            -o "$HOME/.local/bin/rattler-build"
          chmod +x "$HOME/.local/bin/rattler-build"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Upload packages to prefix.dev
        run: |
          shopt -s globstar nullglob
          for file in extracted/**/*.conda; do
            rattler-build upload prefix --channel inference-extensions "$file"
          done
